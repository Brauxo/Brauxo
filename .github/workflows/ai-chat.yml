name: AI Chat Handler

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write
  contents: write

jobs:
  answer-question:
    if: contains(github.event.issue.labels.*.name, 'ai-chat')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install python-dotenv requests google-generativeai

      - name: Run Chat Handler
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python scripts/chat_handler.py

      - name: Commit and Push README update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[QUERY_LOG] :: Terminal access by @${{ github.event.issue.user.login }}"
          file_pattern: README.md
